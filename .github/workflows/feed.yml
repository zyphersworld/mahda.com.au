name: Build news feed

# This workflow lives at the REPO ROOT (.github/workflows/feed.yml) because
# GitHub only runs workflows from the root. The Reckoning Desk project itself
# lives in the reckoning-desk/ subfolder, so the paths below point into it.

on:
  schedule:
    - cron: '0,30 * * * *'   # every 30 minutes (UTC). Loosen if you hit Action minutes limits.
  workflow_dispatch:          # adds the "Run workflow" button in the Actions tab
  push:
    branches: [ main ]        # rebuild on deploy
    paths:
      - 'reckoning-desk/**'        # only when the project changes
      - '.github/workflows/feed.yml'

permissions:
  contents: write             # needed to commit headlines.json back

concurrency:
  group: build-feed
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and build headlines.json
        run: node reckoning-desk/scripts/build-feed.mjs

      - name: Commit if changed
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add reckoning-desk/headlines.json
          if git diff --staged --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: refresh headlines $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
